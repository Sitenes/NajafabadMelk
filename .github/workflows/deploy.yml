name: Deploy to Server

on:
  push:
    branches:
      - master
      # - main
      - publish

env:
  DOTNET_VERSION: "10.0.x"
  PUBLISH_COMMAND: "dotnet publish -c Release -r linux-x64 --no-self-contained -o out"
  GITHUB_REPO_NAME: "NajafabadMelk" 
  APP_NAME: "WebSite" 
  APP_PORT: "5003"
  ASPNETCORE_ENVIRONMENT: "Production"
  BASE_DIR: "/home/amin/User/Projects/Dotnet/Publish"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: |
          echo "Running publish command:"
          echo "${{ env.PUBLISH_COMMAND }}"
          ${{ env.PUBLISH_COMMAND }}

      - name: Debug publish output
        run: |
          echo "out directory content:"
          ls -lah out

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*"
          target: "${{ env.BASE_DIR }}/${{ env.GITHUB_REPO_NAME || github.event.repository.name }}"

      - name: Start App on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -Eeuo pipefail

            GITHUB_REPO_NAME="${{ env.GITHUB_REPO_NAME || github.event.repository.name }}"
            BASE_DIR="${{ env.BASE_DIR }}"
            APP_NAME="${{ env.APP_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"
            ENVIRONMENT="${{ env.ASPNETCORE_ENVIRONMENT }}"

            APP_DIR="$BASE_DIR/$GITHUB_REPO_NAME"
            LOG_FILE="$APP_DIR/app.log"
            PID_FILE="$APP_DIR/app.pid"
            
            echo "Stopping old process..."

            PID=$(lsof -t -i:$APP_PORT || true)

            if [ -n "$PID" ]; then
                echo "Killing PID: $PID"
                kill -9 "$PID" || true
                sleep 3
            else
                echo "No process is running on port $APP_PORT"
            fi

            mkdir -p "$APP_DIR/out"
            cd "$APP_DIR/out"

            echo "Starting app..."

            nohup env \
              ASPNETCORE_ENVIRONMENT="$ENVIRONMENT" \
              ASPNETCORE_URLS="http://127.0.0.1:$APP_PORT" \
              ./"$APP_NAME" \
              > "$LOG_FILE" 2>&1 &

            echo $! > "$PID_FILE"

            echo "PID=$(cat $PID_FILE)"

      - name: Verify App is Running + Logs
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -Eeuo pipefail

            GITHUB_REPO_NAME="${{ env.GITHUB_REPO_NAME || github.event.repository.name }}"
            BASE_DIR="${{ env.BASE_DIR }}"
            APP_PORT="${{ env.APP_PORT }}"

            APP_DIR="$BASE_DIR/$GITHUB_REPO_NAME"
            LOG_FILE="$APP_DIR/app.log"
            PID_FILE="$APP_DIR/app.pid"

            echo "Checking app..."

            sleep 2

            if ! kill -0 $(cat "$PID_FILE") 2>/dev/null; then
              echo "❌ APP FAILED TO START"
              echo "===== LOG ====="
              cat "$LOG_FILE"
              exit 1
            fi

            echo "✅ App is running"

            echo "===== LIVE LOG (20 sec) ====="
            timeout 20s tail -f "$LOG_FILE" || true

            if ! ps -p $(cat "$PID_FILE") >/dev/null; then
                echo "Application crashed"
                exit 1
            fi
            echo "✅✅ App is running"
